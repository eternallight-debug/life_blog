<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片马赛克拼接工具</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 880px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            gap: 10px;
        }
        .row label {
            width: 110px;
            font-size: 14px;
        }
        input, select, button {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="text"] {
            flex: 1;
        }
        button {
            cursor: pointer;
            background: #409eff;
            color: white;
            border: none;
        }
        button:hover {
            background: #337ecc;
        }
        .panel {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px 0;
            border-radius: 6px;
        }
        .panel h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress {
            height: 100%;
            width: 0%;
            background: #409eff;
            transition: width 0.3s;
        }
        #status {
            font-size: 14px;
            color: #666;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        canvas {
            max-width: 100%;
            border: 1px solid #ddd;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>图片马赛克拼接工具</h2>

    <div class="row">
        <label>目标图片：</label>
        <input type="text" id="targetPath" readonly placeholder="请选择图片">
        <button onclick="selectTarget()">浏览</button>
    </div>

    <div class="row">
        <label>马赛克图库：</label>
        <input type="text" id="libPath" readonly placeholder="请选择文件夹">
        <button onclick="selectLibrary()">浏览</button>
    </div>

    <div class="row">
        <label>输出文件名：</label>
        <input type="text" id="outputName" value="mosaic_result.jpg">
    </div>

    <!-- 分辨率缩放 -->
    <div class="panel">
        <h4>目标分辨率缩放</h4>
        <div class="row">
            <label>缩放尺寸：</label>
            <select id="targetScale">
                <option value="raw">原图</option>
                <option value="1080P">1080P</option>
                <option value="2K" selected>2K</option>
                <option value="4K">4K</option>
                <option value="8K">8K</option>
                <option value="10K">10K</option>
            </select>
        </div>
    </div>

    <!-- 参数设置 -->
    <div class="panel">
        <h4>拼接参数</h4>
        <div class="row">
            <label>基础格子大小：</label>
            <input type="number" id="tileSize" value="32" style="width:80px">
            <label>图库尺寸：</label>
            <input type="number" id="libSize" value="100" style="width:80px">
            <label>随机度：</label>
            <input type="number" id="randomness" value="3" style="width:80px">
        </div>
        <div class="row">
            <label>合并概率%：</label>
            <input type="number" id="mergeProb" value="30" style="width:80px">
            <label>颜色阈值：</label>
            <input type="number" id="colorThresh" value="20" style="width:80px">
            <label>最大合并：</label>
            <select id="maxMerge" style="width:80px">
                <option value="2">2×2</option>
                <option value="3" selected>3×3</option>
            </select>
        </div>
    </div>

    <div class="row">
        <label>进度：</label>
        <div class="progress-bar" style="flex:1">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div id="status">就绪</div>

    <div class="btn-group">
        <button onclick="loadLibrary()">加载图库</button>
        <button onclick="startMosaic()">开始生成</button>
        <button onclick="saveResult()">保存图片</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    const RES = {
        raw: null,
        '1080P': { w: 1920, h: 1080 },
        '2K': { w: 2560, h: 1440 },
        '4K': { w: 3840, h: 2160 },
        '8K': { w: 7680, h: 4320 },
        '10K': { w: 10240, h: 5760 }
    };

    let targetFile = null;
    let libFiles = [];
    let libImages = [];
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let resultImage = null;

    // 选择目标图
    function selectTarget() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            targetFile = e.target.files[0];
            document.getElementById('targetPath').value = targetFile.name;
        };
        input.click();
    }

    // 选择图库（浏览器只能多选，不能选文件夹）
    function selectLibrary() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = true;
        input.onchange = e => {
            libFiles = Array.from(e.target.files);
            document.getElementById('libPath').value = `已选 ${libFiles.length} 张`;
        };
        input.click();
    }

    // 加载图库
    async function loadLibrary() {
        if (libFiles.length === 0) { alert('请选择图库'); return; }
        setStatus('正在加载图库...');
        setProgress(0);
        libImages = [];
        const libSize = parseInt(document.getElementById('libSize').value);
        for (let i = 0; i < libFiles.length; i++) {
            const img = await fileToImage(libFiles[i]);
            const square = cropToSquare(img);
            const small = resizeImg(square, libSize, libSize);
            const color = getAvgColor(small);
            libImages.push({ color, img: small });
            setProgress((i + 1) / libFiles.length * 50);
        }
        setStatus(`图库加载完成：${libImages.length} 张`);
        setProgress(50);
    }

    // 开始生成马赛克
    async function startMosaic() {
        if (!targetFile) { alert('请选择目标图'); return; }
        if (libImages.length === 0) { alert('请先加载图库'); return; }
        setStatus('正在处理...');
        setProgress(50);

        // 加载目标图并缩放
        const target = await fileToImage(targetFile);
        const scaleKey = document.getElementById('targetScale').value;
        const scaled = resizeToTarget(target, RES[scaleKey]);
        const tileSize = parseInt(document.getElementById('tileSize').value);
        const randomness = parseInt(document.getElementById('randomness').value);
        const mergeProb = parseInt(document.getElementById('mergeProb').value);
        const colorThresh = parseInt(document.getElementById('colorThresh').value);
        const maxMerge = parseInt(document.getElementById('maxMerge').value);

        // 画布
        canvas.width = scaled.width;
        canvas.height = scaled.height;
        ctx.drawImage(scaled, 0, 0);
        const imageData = ctx.getImageData(0, 0, scaled.width, scaled.height);
        const data = imageData.data;

        // 生成颜色网格
        const cols = Math.floor(scaled.width / tileSize);
        const rows = Math.floor(scaled.height / tileSize);
        const colorGrid = [];
        for (let y = 0; y < rows; y++) {
            const row = [];
            for (let x = 0; x < cols; x++) {
                const c = getTileColor(data, scaled.width, x, y, tileSize);
                row.push(c);
            }
            colorGrid.push(row);
        }

        // 合并地图
        const mergeMap = genMergeMap(colorGrid, cols, rows, mergeProb, colorThresh, maxMerge);
        const used = Array(rows).fill().map(() => Array(cols).fill(false));

        // 绘制
        let count = 0;
        const total = cols * rows;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (used[y][x]) continue;
                const m = mergeMap[y][x];
                const sz = tileSize * m;
                // 区域平均色
                const avg = [0, 0, 0];
                for (let dy = 0; dy < m; dy++) {
                    for (let dx = 0; dx < m; dx++) {
                        const c = colorGrid[y + dy][x + dx];
                        avg[0] += c[0]; avg[1] += c[1]; avg[2] += c[2];
                    }
                }
                const n = m * m;
                const fc = [Math.round(avg[0] / n), Math.round(avg[1] / n), Math.round(avg[2] / n)];
                // 随机匹配
                const candidates = libImages.sort((a, b) => dist(fc, a.color) - dist(fc, b.color))
                    .slice(0, Math.max(1, Math.floor(libImages.length * randomness / 10)));
                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                // 绘制
                ctx.drawImage(pick.img, x * tileSize, y * tileSize, sz, sz);
                // 标记
                for (let dy = 0; dy < m; dy++) {
                    for (let dx = 0; dx < m; dx++) {
                        used[y + dy][x + dx] = true;
                    }
                }
                count++;
                if (count % 50 === 0) {
                    setProgress(50 + (count / total) * 50);
                    setStatus(`已绘制 ${count}/${total}`);
                    await sleep(1);
                }
            }
        }

        setProgress(100);
        setStatus('马赛克生成完成！');
        resultImage = canvas.toDataURL('image/jpeg', 0.95);
    }

    // 保存
    function saveResult() {
        if (!resultImage) { alert('请先生成图片'); return; }
        const a = document.createElement('a');
        a.download = document.getElementById('outputName').value;
        a.href = resultImage;
        a.click();
    }

    // 工具函数
    function setStatus(s) { document.getElementById('status').textContent = s; }
    function setProgress(p) { document.getElementById('progress').style.width = p + '%'; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function fileToImage(file) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.onload = () => res(img);
            img.onerror = rej;
            img.src = URL.createObjectURL(file);
        });
    }
    function cropToSquare(img) {
        const c = document.createElement('canvas');
        const s = Math.min(img.width, img.height);
        c.width = s; c.height = s;
        const g = c.getContext('2d');
        g.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, s, s);
        return c;
    }
    function resizeImg(img, w, h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const g = c.getContext('2d');
        g.drawImage(img, 0, 0, w, h);
        return c;
    }
    function resizeToTarget(img, t) {
        if (!t) return img;
        const ratio = img.width / img.height;
        let w, h;
        if (ratio > t.w / t.h) { w = t.w; h = Math.round(w / ratio); }
        else { h = t.h; w = Math.round(h * ratio); }
        return resizeImg(img, w, h);
    }
    function getAvgColor(canvas) {
        const ctx = canvas.getContext('2d');
        const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let r = 0, g = 0, b = 0, n = 0;
        for (let i = 0; i < d.length; i += 4) {
            r += d[i]; g += d[i + 1]; b += d[i + 2]; n++;
        }
        return [Math.round(r / n), Math.round(g / n), Math.round(b / n)];
    }
    function getTileColor(data, width, x, y, size) {
        let r = 0, g = 0, b = 0, n = 0;
        for (let dy = 0; dy < size; dy++) {
            for (let dx = 0; dx < size; dx++) {
                const px = x * size + dx;
                const py = y * size + dy;
                const i = (py * width + px) * 4;
                r += data[i]; g += data[i + 1]; b += data[i + 2]; n++;
            }
        }
        return [Math.round(r / n), Math.round(g / n), Math.round(b / n)];
    }
    function dist(c1, c2) {
        const dr = c1[0] - c2[0], dg = c1[1] - c2[1], db = c1[2] - c2[2];
        return dr * dr + dg * dg + db * db;
    }
    function genMergeMap(grid, cols, rows, prob, thresh, maxMerge) {
        const map = Array(rows).fill().map(() => Array(cols).fill(1));
        const used = Array(rows).fill().map(() => Array(cols).fill(false));
        const list = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) list.push([y, x]);
        }
        list.sort(() => Math.random() - 0.5);
        for (const [y, x] of list) {
            if (used[y][x]) continue;
            if (Math.random() * 100 > prob) continue;
            // 3x3
            if (maxMerge >= 3 && y + 2 < rows && x + 2 < cols) {
                const c = grid[y + 1][x + 1];
                let ok = true;
                for (let dy = 0; dy < 3; dy++) {
                    for (let dx = 0; dx < 3; dx++) {
                        if (dist(c, grid[y + dy][x + dx]) > thresh * thresh) { ok = false; break; }
                    }
                    if (!ok) break;
                }
                if (ok) {
                    for (let dy = 0; dy < 3; dy++) {
                        for (let dx = 0; dx < 3; dx++) used[y + dy][x + dx] = true;
                    }
                    map[y][x] = 3; continue;
                }
            }
            // 2x2
            if (maxMerge >= 2 && y + 1 < rows && x + 1 < cols) {
                const c = grid[y][x];
                if (dist(c, grid[y][x + 1]) < thresh * thresh &&
                    dist(c, grid[y + 1][x]) < thresh * thresh &&
                    dist(c, grid[y + 1][x + 1]) < thresh * thresh) {
                    used[y][x] = used[y][x + 1] = used[y + 1][x] = used[y + 1][x + 1] = true;
                    map[y][x] = 2; continue;
                }
            }
        }
        return map;
    }
</script>
</body>
</html>
